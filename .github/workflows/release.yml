name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target aarch64-apple-darwin --config src-tauri/tauri.macos.conf.json
          - name: macOS (Intel)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target x86_64-apple-darwin --config src-tauri/tauri.macos.conf.json
          - name: Linux (x64)
            platform: ubuntu-22.04
            rust-targets: ""
            args: --config src-tauri/tauri.linux.conf.json
          - name: Linux (ARM64)
            platform: ubuntu-22.04-arm
            rust-targets: ""
            args: --config src-tauri/tauri.linux.conf.json
          - name: Windows (x64)
            platform: windows-latest
            rust-targets: ""
            args: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Keychains ${{ github.ref_name }}
          releaseBody: Download the installer for your platform from the assets below.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
